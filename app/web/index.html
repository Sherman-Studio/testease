<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Ease</title>
    <script>
      // Theme boot — runs before first paint so neither theme flashes.
      // Kept in sync with the toggle in App.vue (same key, same colours).
      ;(function () {
        var theme = 'dark'
        try {
          theme = localStorage.getItem('testease.theme') === 'light' ? 'light' : 'dark'
        } catch (e) {
          /* localStorage unavailable — dark default */
        }
        var el = document.documentElement
        el.dataset.theme = theme
        el.style.backgroundColor = theme === 'light' ? '#eef1f6' : '#07090e'
        var meta = document.createElement('meta')
        meta.name = 'theme-color'
        meta.content = theme === 'light' ? '#eef1f6' : '#07090e'
        document.head.appendChild(meta)
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
