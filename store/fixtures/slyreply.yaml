# fixtures/slyreply.yaml — the SlyReply tenant fixture catalog.
#
# Slice 3a of #1006. A per-tenant description of the test fixtures the
# personas have access to: base URL, mail viewer, payment test cards,
# seeded accounts, guard-rails, glossary. The operator writes this once
# per app; ``qa_store.fixtures.load_fixture_catalog`` parses it (with
# ``${ENV}`` interpolation for secrets) and the variant generator
# (``qa_store.variants``) reads slices of it to branch canonical actions
# into testable sad-paths.
#
# Schema is additive — new top-level keys can appear without breaking the
# loader. The loader validates only the small required set documented in
# ``REQUIRED_CATALOG_KEYS``.

app: slyreply
base_url: https://sandbox.slyreply.ai

# Inboxes the personas can read from (verification codes, password-reset
# links, AI-generated replies). Web UI + JSON API.
inboxes:
  - name: mailpit
    url: https://sandbox.slyreply.ai/mailpit
    description: |
      Operator-facing mail viewer. Personas can poll it for verification
      codes, password-reset links, AI-generated replies. Web UI + JSON API.

# Payment + billing fixtures — Revolut sandbox test cards (provider-
# neutral shape). The variant generator keys ``category: billing``
# canonical actions off these card ids. Subscription lifecycle error
# states are driven via the QA /api/qa/billing/advance hook (Revolut
# has no test-clock; the checkout widget #1977 isn't built yet).
# Reference: https://developer.revolut.com/docs/guides/merchant/test-and-go-live/testing/test-cards
payment_test_cards:
  - id: valid
    number: "4929 4205 7359 5709"
    description: Visa, always succeeds
  - id: valid-mastercard
    number: "5281 4388 0180 4148"
    description: Mastercard, always succeeds
  - id: declined-generic
    number: "2720 9988 3777 9594"
    description: Card declined — do_not_honour / generic decline
  - id: requires-3ds
    number: "4242 4242 4242 4242"
    description: 3DS-fail challenge (only fires when amount >= £25 / €30)
  - id: insufficient-funds
    number: "4929 5736 3812 5985"
    description: Card declined — insufficient_funds
  - id: expired
    number: "4532 3367 4387 4205"
    description: Card declined — expired

# Pre-seeded accounts (admin, demo, etc.). Secrets come from env — never
# inline. The loader interpolates ``${VAR}`` against ``os.environ`` and
# leaves an unset var as the literal placeholder so a missing secret is
# visible rather than silently empty.
accounts:
  - id: admin
    email: ${TESTEASE_ADMIN_EMAIL}
    password: ${TESTEASE_ADMIN_PASSWORD}
    role: admin
    description: Seeded sandbox admin account

# Auth fixtures — well-known bad inputs a well-built signup must reject.
# The variant generator keys ``category: auth`` actions off these.
auth_test_inputs:
  weak_password: "123"
  duplicate_email: ${TESTEASE_ADMIN_EMAIL}
  invalid_email: "broken-no-at-sign"
  disposable_email_domain: "mailinator.com"

# Things the operator wants personas to AVOID touching.
do_not_touch:
  - "/admin/users/*/delete"
  - "POST /api/users/{id}/disable"

# Tenant-specific terminology the personas should adopt.
glossary:
  uid: "the email persona configuration (provider + model + system prompt + email address)"
  agent: "another word for UID"
